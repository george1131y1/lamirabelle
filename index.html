<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hknewhouse - 香港新樓資訊平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0A2540 0%, #1A3A5C 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        .logo span {
            color: #D4A853;
        }
        .tagline {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 3rem;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .project-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }
        .project-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .project-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .project-desc {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }
        .arrow {
            float: right;
            font-size: 1.5rem;
            color: #D4A853;
        }
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo">hknew<span>house</span></h1>
        <p class="tagline">香港新樓資訊平台 · 專業置業分析</p>
        
        <div class="projects">
            <a href="/lamirabelle/" class="project-card">
                <span class="arrow">→</span>
                <div class="project-name">海瑅灣 La Mirabelle</div>
                <div class="project-desc">日出康城第13期 · 臨海鐵路地標 · 投資分析報告</div>
            </a>
        </div>
        
        <footer>
            <p>© 2024 hknewhouse.xyz · 專業地產資訊平台</p>
        </footer>
    </div>
</body>
</html>
